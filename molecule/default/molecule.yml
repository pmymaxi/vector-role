---
# Dependency management (download roles/collections)
dependency:
  name: galaxy
  options:
    requirements-file: ${MOLECULE_SCENARIO_DIRECTORY}/requirements.yml
platforms:
  - name: molecule-netology
    image: rockylinux:9
    env:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin

  - name: molecule-oracle
    image: oraclelinux:9
    env:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin

  - name: molecule-ubuntu
    image: ubuntu:latest
    env:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin

ansible:
  cfg:
    defaults:
      host_key_checking: false
      verbosity: 1
    ssh_connection:
      pipelining: true
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../:${HOME}/.ansible/roles"
    ANSIBLE_FORCE_COLOR: "1"
    ANSIBLE_LOAD_CALLBACK_PLUGINS: "1"

  executor:
    backend: ansible-playbook
    args:
      ansible_navigator:
        - --mode stdout
        - --pull-policy missing
        - --execution-environment-image ghcr.io/ansible/community-ansible-dev-tools:latest

  playbooks:
    create: create.yml
    converge: converge.yml
    destroy: destroy.yml
    cleanup: cleanup.yml
    prepare: prepare.yml
    verify: verify.yml

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - idempotence
    - cleanup
    - destroy
